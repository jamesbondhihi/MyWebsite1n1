                                <form id="contactForm">
  <h2>Kontakt</h2>

  <input type="text" id="name" placeholder="Name" required><br><br>
  <input type="email" id="email" placeholder="Email" required><br><br>
  <input type="text" id="phone" placeholder="Telefon"><br><br>
  <textarea id="message" placeholder="Nachricht" required></textarea><br><br>

  <button type="submit">Senden</button>
  <p id="status"></p>
</form>

<script>
const BACKEND_URL = 'https://order-backend-one.vercel.app';

document.getElementById('contactForm').addEventListener('submit', async (e) => {
  e.preventDefault();

  const name = document.getElementById('name').value.trim();
  const email = document.getElementById('email').value.trim();
  const phone = document.getElementById('phone').value.trim();
  const message = document.getElementById('message').value.trim();

  if (!name || !email || !message) {
    document.getElementById('status').textContent = "❌ Bitte alle Felder ausfüllen";
    return;
  }

  const formData = {
    customer_name: name,
    email: email,
    phone: phone || "Not provided",
    shipping_address: message,
    product_name: "Contact Form",
    quantity: 1,
    price: 0
  };

  console.log("Sende:", formData); // 👈 wichtig zum debuggen

  try {
    const res = await fetch(`${BACKEND_URL}/api/orders`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(formData)
    });

    const data = await res.json();

    console.log("Antwort:", data);

    if (res.ok) {
      document.getElementById('status').textContent = "✅ Gesendet!";
      document.getElementById('contactForm').reset();
    } else {
      document.getElementById('status').textContent = "❌ " + data.error;
    }

  } catch (err) {
    console.error(err);
    document.getElementById('status').textContent = "❌ Server Fehler";
  }
});
</script>
