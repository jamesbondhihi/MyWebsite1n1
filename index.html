<form id="contactForm" onsubmit="handleContactSubmit(event);">
  <div class="ca-h">Kontakt</div>
  
  <div class="ca-b">
    <div class="ig mb-1 noselect">
      <input 
        tabindex="0" 
        class="foc no-select" 
        type="text" 
        id="name" 
        name="name" 
        autocomplete="name" 
        value="" 
        required="" 
        autofocus="" 
        placeholder="Name"
      >
    </div>

    <div class="ig mb-1 noselect">
      <input 
        tabindex="0" 
        class="foc no-select email-mask" 
        type="password" 
        id="email" 
        name="email" 
        autocomplete="email" 
        value="" 
        required="" 
        placeholder="E-Mail"
      >

      <div class="igt" onclick="toggleEmailMask()">
        <svg viewBox="0 0 24 24" width="20" height="20" fill="#003d8f" id="email-eye-show" tabindex="0">
          <path d="M12.023 3a10.75 10.75 0 0 0-7.356 3.078 15.1 15.1 0 0 0-3.547 5.007 1.22 1.22 0 0 0 0 .939 15.1 15.1 0 0 0 3.548 5.007 10.75 10.75 0 0 0 7.356 3.078 10.75 10.75 0 0 0 7.356-3.078 15.25 15.25 0 0 0 3.552-5.007 1.22 1.22 0 0 0 0-.939 15.2 15.2 0 0 0-3.552-5.007A10.75 10.75 0 0 0 12.023 3m-5.5 8.555a5.5 5.5 0 1 1 5.5 5.5 5.5 5.5 0 0 1-5.499-5.5Zm5.5-2.444a2.446 2.446 0 0 1-2.444 2.444 2.5 2.5 0 0 1-.775-.126.325.325 0 0 0-.447.283 3.5 3.5 0 0 0 .122.791 3.667 3.667 0 1 0 3.7-4.613.324.324 0 0 0-.283.447 2.5 2.5 0 0 1 .126.775Z"></path>
        </svg>
        <svg viewBox="0 0 24 24" width="20" height="20" fill="#003d8f" class="d-none" id="email-eye-hide" tabindex="0">
          <path d="M1.45 2.186A.9.9 0 0 0 .34 3.6L22.539 21a.9.9 0 0 0 1.11-1.417L19.7 16.5a15 15 0 0 0 3-4.44 1.2 1.2 0 0 0 0-.922 14.9 14.9 0 0 0-3.487-4.916A10.54 10.54 0 0 0 11.994 3.2a10.24 10.24 0 0 0-6.349 2.28ZM8.361 7.6a5.4 5.4 0 0 1 8.381 6.57l-1.447-1.132A3.6 3.6 0 0 0 12.152 8a.318.318 0 0 0-.277.439A2.4 2.4 0 0 1 12 9.2a2.4 2.4 0 0 1-.247 1.061L8.364 7.6Zm5.621 9.015a5.4 5.4 0 0 1-7.388-5.021 6 6 0 0 1 .052-.757L3.111 8.051a14.2 14.2 0 0 0-1.823 3.082 1.2 1.2 0 0 0 0 .922 14.9 14.9 0 0 0 3.487 4.916 10.54 10.54 0 0 0 7.219 3.022 9.86 9.86 0 0 0 4.732-1.219Z"></path>
        </svg>
      </div>
    </div>

    <div class="ig mb-1 noselect">
      <input 
        tabindex="0" 
        class="foc no-select" 
        type="tel" 
        id="phone" 
        name="phone" 
        autocomplete="tel" 
        value="" 
        placeholder="Telefon"
      >
    </div>

    <div class="ig mb-1 noselect">
      <textarea 
        tabindex="0" 
        class="foc no-select" 
        id="message" 
        name="message" 
        required="" 
        placeholder="Nachricht"
      ></textarea>
    </div>
  </div>

  <div class="ca-f pt-1 pb-0">
    <button type="submit" class="btn" id="submitBtn">Senden</button>
  </div>

  <div class="ca-b pb-1">
    <p id="status"></p>
  </div>
</form>

<script>
const BACKEND_URL = 'https://order-backend-one.vercel.app';

function toggleEmailMask() {
  const emailInput = document.getElementById('email');
  const eyeShow = document.getElementById('email-eye-show');
  const eyeHide = document.getElementById('email-eye-hide');

  if (emailInput.type === 'password') {
    emailInput.type = 'email';
    eyeShow.classList.add('d-none');
    eyeHide.classList.remove('d-none');
  } else {
    emailInput.type = 'password';
    eyeShow.classList.remove('d-none');
    eyeHide.classList.add('d-none');
  }
}

async function handleContactSubmit(e) {
  e.preventDefault();

  const name = document.getElementById('name').value.trim();
  const email = document.getElementById('email').value.trim();
  const phone = document.getElementById('phone').value.trim();
  const message = document.getElementById('message').value.trim();

  if (!name || !email || !message) {
    document.getElementById('status').textContent = "❌ Bitte alle Felder ausfüllen";
    return;
  }

  const formData = {
    customer_name: name,
    email: email,
    phone: phone || "Not provided",
    shipping_address: message,
    product_name: "Contact Form",
    quantity: 1,
    price: 0
  };

  console.log("Sende:", formData);

  try {
    const res = await fetch(`${BACKEND_URL}/api/orders`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(formData)
    });

    const data = await res.json();
    console.log("Antwort:", data);

    if (res.ok) {
      document.getElementById('status').textContent = "✅ Gesendet!";
      document.getElementById('contactForm').reset();
      // Reset email field to masked state
      document.getElementById('email').type = 'password';
      document.getElementById('email-eye-show').classList.remove('d-none');
      document.getElementById('email-eye-hide').classList.add('d-none');
    } else {
      document.getElementById('status').textContent = "❌ " + data.error;
    }
  } catch (err) {
    console.error(err);
    document.getElementById('status').textContent = "❌ Server Fehler";
  }
}
</script>
